name: dsgv_hub_app
description: DSGV Hub — C2C + WiFi/MQTT IoT Platform (Google Home, Alexa, SmartThings).

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Offline-First Local Database
  objectbox: ^4.0.0
  objectbox_flutter_libs: ^4.0.0
  path_provider: ^2.1.3

  # MQTT Dual-Broker Layer
  mqtt_client: ^10.4.5

  # Networking
  http: ^1.2.1
  dio: ^5.4.3+1

  # Secure Credential Storage (MQTT creds, tokens)
  flutter_secure_storage: ^9.2.2

  # QR Code Scanning (DSGV provisioning QR codes)
  mobile_scanner: ^5.2.1

  # mDNS (Multicast DNS) — discovers DSGV devices on the local network
  # without needing the device to publish its IP over MQTT first.
  # Queries _dsgv._tcp.local and returns hostname, IP, and capability TXT records.
  multicast_dns: ^0.3.2+4

  # BLE provisioning (push Wi-Fi credentials to un-provisioned ESP32 devices)
  flutter_blue_plus: ^1.35.5

  # WiFi SSID scanning (lists nearby networks in provisioning screen)
  wifi_scan: ^0.4.1

  # Runtime permission requests (BLE scan/connect, location)
  permission_handler: ^11.3.0

  # Connectivity (for mDNS / network state detection)
  connectivity_plus: ^6.0.5

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  objectbox_generator: ^4.0.0
  riverpod_generator: ^2.3.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0A0E1A"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  web:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
