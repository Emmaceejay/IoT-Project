name: nexus_hub_app
description: Professional Universal Matter / MQTT IoT Platform Application.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Offline-First Local Database
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  path_provider: ^2.1.3

  # MQTT Dual-Broker Layer
  mqtt_client: ^10.4.5

  # Networking
  http: ^1.2.1
  dio: ^5.4.3+1

  # Secure Credential Storage (MQTT creds, tokens)
  flutter_secure_storage: ^9.2.2

  # QR Code Scanning (used for Matter device pairing flow)
  mobile_scanner: ^5.2.1

  # Connectivity (for mDNS / network state detection)
  connectivity_plus: ^6.0.5

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  isar_generator: ^3.1.0
  riverpod_generator: ^2.4.2

flutter:
  uses-material-design: true
